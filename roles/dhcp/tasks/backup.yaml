- name: Is backup dir exist
  ansible.builtin.file:
    path: "{{ dhcp_backup_path }}"
    state: directory
    mode: u=rwx,g=rx,o=rx

# If we need copy files
# - name: Is backup files exist
#   ansible.builtin.stat:
#     path: "{{ item }}"
#   loop: "{{ dhcp_backup_files }}"
#   register: dhcp_backup_files_stat

- name: Is backup dirs exist
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ dhcp_backup_dirs }}"
  register: dhcp_backup_dirs_stat

# If we need copy files
# - name: Copy files to backup dir
#   ansible.builtin.copy:
#     src: "{{ item.stat.path }}"
#     dest: "{{ dhcp_backup_path }}/"
#     mode: preserve
#     remote_src: true
#   loop: "{{ dhcp_backup_files_stat.results }}"
#   when:
#     - item.stat.exists
#     - item.stat.isreg

- name: Copy dirs to backup dir
  ansible.builtin.copy:
    src: "{{ item.stat.path }}"
    dest: "{{ dhcp_backup_path }}/{{ ansible_date_time.iso8601_basic_short }}_{{ item.stat.path | basename }}"
    mode: preserve
    remote_src: true
  loop: "{{ dhcp_backup_dirs_stat.results }}"
  when:
  - item.stat.exists
  - item.stat.isdir

